# Desarrollo / prueba local: PostgreSQL + aplicación en un solo comando.
# Uso:
#   1. cp .env.docker.example .env.docker
#   2. Edita JWT_SECRET (mín. 32 caracteres; no subas .env.docker al git)
#   3. docker compose --env-file .env.docker up --build
#
# La app: http://localhost:4000  ·  Health: http://localhost:4000/api/health

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sistema}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sistema_dev}
      POSTGRES_DB: ${POSTGRES_DB:-sistema_horario}
    volumes:
      - sistema_horario_pg:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-sistema}:${POSTGRES_PASSWORD:-sistema_dev}@db:5432/${POSTGRES_DB:-sistema_horario}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      TRUST_PROXY: ${TRUST_PROXY:-0}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_APP_PASSWORD: ${SMTP_APP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  sistema_horario_pg:
